services:
  bot:
    build:
      context: ./sns
      dockerfile: Dockerfile
    env_file:
      - path: ./sns/.env
        required: false
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: activities
      POSTGRES_USER: activities
      POSTGRES_PASSWORD: activities
    ports:
      - "5432:5432"
    volumes:
      - activities-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activities -d activities"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  activities-db:
